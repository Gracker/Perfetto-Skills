name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Perfetto Skills
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: Perfetto-Skills
          persist-credentials: false
      - name: Read pinned SmartPerfetto commit
        id: source
        working-directory: Perfetto-Skills
        shell: bash
        run: |
          commit="$(python3 -c 'import json; print(json.load(open("catalog/smartperfetto-export.json"))["source"]["commit"])')"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
      - name: Check out pinned SmartPerfetto source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Gracker/SmartPerfetto
          ref: ${{ steps.source.outputs.commit }}
          path: SmartPerfetto
          persist-credentials: false
          submodules: "recursive"
      - name: Fetch pinned official Perfetto release
        working-directory: SmartPerfetto/perfetto
        shell: bash
        run: |
          repository="$(python3 -c 'import json; catalog=json.load(open("../../Perfetto-Skills/catalog/smartperfetto-export.json")); print(catalog["official_perfetto"]["repository"])')"
          tag="$(python3 -c 'import json; catalog=json.load(open("../../Perfetto-Skills/catalog/smartperfetto-export.json")); print(catalog["official_perfetto"]["tag"])')"
          git fetch --depth=1 "$repository" "refs/tags/${tag}:refs/tags/${tag}"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Verify
        working-directory: Perfetto-Skills
        run: |
          uv sync --extra dev
          uv run python tools/verify.py --smartperfetto ../SmartPerfetto

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Build reproducible archives
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 tools/build_release.py --version "$version" --output dist
          (cd dist && shasum -a 256 -c SHA256SUMS)
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.tar.gz dist/SHA256SUMS --verify-tag --generate-notes
