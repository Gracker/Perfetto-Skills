name: Verify

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out Perfetto Skills
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: Perfetto-Skills
          persist-credentials: false
      - name: Read pinned SmartPerfetto commit
        id: source
        working-directory: Perfetto-Skills
        shell: bash
        run: |
          commit="$(python3 -c 'import json; print(json.load(open("catalog/smartperfetto-export.json"))["source"]["commit"])')"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
      - name: Check out pinned SmartPerfetto source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Gracker/SmartPerfetto
          ref: ${{ steps.source.outputs.commit }}
          path: SmartPerfetto
          persist-credentials: false
          submodules: "recursive"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}
      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Verify standard Skill, export, and real traces
        working-directory: Perfetto-Skills
        shell: bash
        run: |
          set -o pipefail
          mkdir -p test-output
          uv sync --extra dev
          uv run python tools/verify.py --smartperfetto ../SmartPerfetto 2>&1 | tee test-output/verify.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-${{ matrix.python }}
          path: Perfetto-Skills/test-output/verify.log
          if-no-files-found: ignore
          retention-days: 7
